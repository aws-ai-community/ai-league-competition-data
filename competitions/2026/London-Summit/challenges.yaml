# =============================================================================
# AI League Agentic Challenge Definition — London Summit 2026
# =============================================================================

name: "London Summit Agentic Challenge 2026"
version: "1.0.0"
description: "AWS AI League dungeon game — navigate maps, defeat challenges, collect coins, reach the treasure. Includes door/key mechanics."

# -----------------------------------------------------------------------------
# Game Parameters
# -----------------------------------------------------------------------------
game_parameters:
  grid_rows: 10
  grid_cols: 10
  starting_lives: 5
  timer_seconds: 350  # 5 minutes 50 seconds
  max_path_steps: 200

# -----------------------------------------------------------------------------
# Challenge Types
# -----------------------------------------------------------------------------
challenge_types:
  c1:
    name: "Violent Violet"
    description: "Guardrail test — agent must block harmful content"
    points_correct: 400
    points_incorrect: 0
    lose_life_on_incorrect: true
    grading_method: guardrail_block

  c2:
    name: "Blue Brain"
    description: "Code execution challenge — solve computational problems"
    points_correct: 600
    points_incorrect: 0
    lose_life_on_incorrect: true
    grading_method: code_execution

  c3:
    name: "Memento"
    description: "Memory challenge — recall information about the game map"
    points_correct: 550
    points_incorrect: 0
    lose_life_on_incorrect: true
    grading_method: exact_match

  c4:
    name: "Dark Prophet"
    description: "Web scraping challenge — answer questions about website content"
    points_correct: 800
    points_incorrect: 0
    lose_life_on_incorrect: true
    grading_method: web_content_match

  c5:
    name: "Bonehead"
    description: "Simple factual question — optimize for token efficiency"
    points_correct: 250
    points_incorrect: 0
    lose_life_on_incorrect: true
    grading_method: contains_match

  c17:
    name: "Distraction"
    description: "Concise answer challenge — answer accurately with minimal tokens"
    points_correct: 750
    points_incorrect: 0
    lose_life_on_incorrect: true
    grading_method: llm_judge

  c18:
    name: "Healthcare API"
    description: "Structured output — convert plain English to exact JSON"
    points_correct: 500
    points_incorrect: 0
    lose_life_on_incorrect: true
    grading_method: json_exact_match
    schema_ref: "healthcare_intake"

# -----------------------------------------------------------------------------
# Door Tiles — require matching key to be collected first
# -----------------------------------------------------------------------------
door_tiles:
  c30:
    name: "Red Door"
    color: "red"
    requires_key: "c40"
    behavior: challenge
    note: "Game asks 'What is red key N?' — agent must have collected c40 first"

  c31:
    name: "Blue Door"
    color: "blue"
    requires_key: "c41"
    behavior: challenge

  c32:
    name: "Green Door"
    color: "green"
    requires_key: "c42"
    behavior: challenge

  c33:
    name: "Yellow Door"
    color: "yellow"
    requires_key: "c43"
    behavior: challenge

# -----------------------------------------------------------------------------
# Key Tiles — collectible, unlocks matching door
# -----------------------------------------------------------------------------
key_tiles:
  c40:
    name: "Red Key"
    color: "red"
    unlocks: "c30"
    behavior: walkable

  c41:
    name: "Blue Key"
    color: "blue"
    unlocks: "c31"
    behavior: walkable

  c42:
    name: "Green Key"
    color: "green"
    unlocks: "c32"
    behavior: walkable

  c43:
    name: "Yellow Key"
    color: "yellow"
    unlocks: "c33"
    behavior: walkable

# -----------------------------------------------------------------------------
# Coin Tiles
# -----------------------------------------------------------------------------
coin_tiles:
  c7:
    points: 250

# -----------------------------------------------------------------------------
# Hazard Tiles
# -----------------------------------------------------------------------------
hazard_tiles:
  c8:
    lives_lost: 1

# -----------------------------------------------------------------------------
# Scoring
# -----------------------------------------------------------------------------
scoring:
  bonuses:
    treasure_reached: 1000
    per_life_remaining: 250
  token_bonus:
    max_bonus: 1000
    formula: "max_bonus - (total_output_tokens / challenges_visited)"
    min_value: 0

# -----------------------------------------------------------------------------
# Structured Output Schemas
# -----------------------------------------------------------------------------
structured_output_schemas:
  healthcare_intake:
    description: "Patient intake JSON structure"
    schema:
      patient_id: "string or null"
      first_name: "string or null"
      last_name: "string or null"
      provider_name: "string or null"
      insurance_id: "string or null"
    rules:
      - "Output only the JSON object — no preamble, no explanation, no closing text"
      - "If a field's value is not present in the input sentence, set it to null"
      - "Do not infer or guess values not explicitly stated"
      - "Field names must match the schema exactly (lowercase, underscores)"
      - "Do not add any fields beyond those defined in the schema"

# -----------------------------------------------------------------------------
# Model Customization Bonus
# -----------------------------------------------------------------------------
model_customization_bonus:
  - custom_models: 0
    token_penalty_reduction: 0.00
  - custom_models: 1
    token_penalty_reduction: 0.50
  - custom_models: 2
    token_penalty_reduction: 0.70
  - custom_models: 3
    token_penalty_reduction: 0.85
  - custom_models: 4
    token_penalty_reduction: 0.92
  - custom_models: 5
    token_penalty_reduction: 0.95

# -----------------------------------------------------------------------------
# Lambda Tool Constraints
# -----------------------------------------------------------------------------
lambda_constraints:
  runtime: "python3.11"
  architecture: "arm64"
  max_memory_mb: 3584
  max_timeout_seconds: 190
  pre_installed_packages:
    - boto3
    - botocore
    - urllib3
    - json
    - re
    - os
    - sys
    - math
    - collections
    - datetime
    - hashlib
    - base64
    - html
    - xml
